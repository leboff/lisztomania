services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - SUPABASE_URL
      - SUPABASE_SERVICE_ROLE_KEY
      - SUPABASE_JWT_SECRET
      - OPENAI_API_KEY
      - LLM_BASE_URL
      - LLM_MODEL
      - PIRATE_WEATHER_API_KEY
      - FRONTEND_URL

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL
        - NEXT_PUBLIC_SUPABASE_ANON_KEY
        - NEXT_PUBLIC_API_URL
    restart: unless-stopped
